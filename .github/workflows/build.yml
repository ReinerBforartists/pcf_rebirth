name: Build VST3 – macOS & Linux

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # macOS – Universal Binary
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout Projekt
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: CMake konfigurieren
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13"

      - name: Bauen
        run: cmake --build build --config Release

      - name: VST3 Bundle isolieren und manuell zippen
        run: |
          # 1. Find the VST3 folder
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          echo "VST3 found in: $VST3_PATH"

          if [ -z "$VST3_PATH" ]; then
            echo "Error: No .vst3 folder found!"
            exit 1
          fi

          # 2. Copy to root and rename
          cp -r "$VST3_PATH" PCF_ReBirth.vst3

          # 3. FIX: Remove trailing commas from moduleinfo.json (JUCE Bug Fix)
          # macOS sed requires an empty string for -i
          sed -i '' 's/,\s*}/}/g; s/,\s*]/]/g' PCF_ReBirth.vst3/moduleinfo.json

          # 4. Strip debug symbols
          find PCF_ReBirth.vst3 -type f \( -name "*.dylib" -o ! -name "*.*" \) | xargs strip -x 2>/dev/null || true

          # 5. Zip the folder
          zip -r PCF_ReBirth_macOS.zip PCF_ReBirth.vst3

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_macOS
          path: PCF_ReBirth_macOS.zip

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PCF_ReBirth_macOS.zip

  # ──────────────────────────────────────────────
  # Linux – x86_64
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Projekt
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxinerama-dev libxext-dev \
            libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev \
            libcurl4-openssl-dev libjack-jackd2-dev ladspa-sdk mesa-common-dev zip

      - name: CMake konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Bauen
        run: cmake --build build --config Release

      - name: VST3 Bundle isolieren und manuell zippen
        run: |
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          echo "VST3 found in: $VST3_PATH"

          if [ -z "$VST3_PATH" ]; then
            echo "Error: No .vst3 folder found!"
            exit 1
          fi

          cp -r "$VST3_PATH" PCF_ReBirth.vst3

          # 3. FIX: Remove trailing commas from moduleinfo.json (JUCE Bug Fix)
          # Linux sed does not need the empty string for -i
          sed -i 's/,\s*}/}/g; s/,\s*]/]/g' PCF_ReBirth.vst3/moduleinfo.json

          find PCF_ReBirth.vst3 -type f ! -name "*.*" | xargs strip 2>/dev/null || true

          # Zip the folder
          zip -r PCF_ReBirth_Linux.zip PCF_ReBirth.vst3

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_Linux
          path: PCF_ReBirth_Linux.zip

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PCF_ReBirth_Linux.zip
