name: Build VST3 – macOS & Linux

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # macOS – Universal Binary
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout Projekt
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: CMake konfigurieren
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13"

      - name: Bauen
        run: cmake --build build --config Release

      - name: VST3 Bundle isolieren und manuell zippen
        run: |
          # 1. Den VST3-Ordner suchen
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          echo "VST3 gefunden in: $VST3_PATH"

          if [ -z "$VST3_PATH" ]; then
            echo "Fehler: Kein .vst3 Ordner gefunden!"
            exit 1
          fi

          # 2. Den Ordner an die Root kopieren und exakt benennen
          cp -r "$VST3_PATH" PCF_ReBirth.vst3

          # 2b. Trailing commas aus moduleinfo.json entfernen (ungültiges JSON, manche Hosts brechen daran)
          MODULEINFO="PCF_ReBirth.vst3/Contents/Resources/moduleinfo.json"
          if [ -f "$MODULEINFO" ]; then
            python3 -c 'import re,sys; p=sys.argv[1]; c=open(p).read(); open(p,"w").write(re.sub(r",(\s*[}\]])", r"\1", c))' "$MODULEINFO"
            python3 -c 'import json,sys; json.load(open(sys.argv[1])); print("moduleinfo.json: gueltiges JSON")' "$MODULEINFO"
          fi

          # 3. Debug-Symbole entfernen (macht die Datei kleiner)
          find PCF_ReBirth.vst3 -type f \( -name "*.dylib" -o ! -name "*.*" \) | xargs strip -x 2>/dev/null || true

      - name: pluginval installieren
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -q pluginval.zip

      - name: Plugin validieren (pluginval)
        run: |
          ./pluginval.app/Contents/MacOS/pluginval --validate PCF_ReBirth.vst3

      - name: Ad-hoc signieren
        run: |
          chmod +x PCF_ReBirth.vst3/Contents/MacOS/PCF_ReBirth
          codesign --force --deep -s - PCF_ReBirth.vst3

      - name: Zippen
        run: |
          # Nur den Ordner PCF_ReBirth.vst3 in das Zip packen
          # Wir gehen in den Ordner, damit das Zip keine Root-Verzeichnisse enthält
          zip -r PCF_ReBirth_macOS.zip PCF_ReBirth.vst3

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_macOS
          path: PCF_ReBirth_macOS.zip # Wir laden JETZT die fertige Zip-Datei hoch, keinen Ordner!

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PCF_ReBirth_macOS.zip

  # ──────────────────────────────────────────────
  # Linux – x86_64
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Projekt
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libx11-dev libxinerama-dev libxext-dev \
            libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev \
            libcurl4-openssl-dev libjack-jackd2-dev ladspa-sdk mesa-common-dev zip

      - name: CMake konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Bauen
        run: cmake --build build --config Release

      - name: VST3 Bundle isolieren und manuell zippen
        run: |
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          echo "VST3 gefunden in: $VST3_PATH"

          if [ -z "$VST3_PATH" ]; then
            echo "Fehler: Kein .vst3 Ordner gefunden!"
            exit 1
          fi

          cp -r "$VST3_PATH" PCF_ReBirth.vst3

          # Trailing commas aus moduleinfo.json entfernen (ungültiges JSON, manche Hosts brechen daran)
          MODULEINFO="PCF_ReBirth.vst3/Contents/Resources/moduleinfo.json"
          if [ -f "$MODULEINFO" ]; then
            python3 -c 'import re,sys; p=sys.argv[1]; c=open(p).read(); open(p,"w").write(re.sub(r",(\s*[}\]])", r"\1", c))' "$MODULEINFO"
            python3 -c 'import json,sys; json.load(open(sys.argv[1])); print("moduleinfo.json: gueltiges JSON")' "$MODULEINFO"
          fi

          find PCF_ReBirth.vst3 -type f ! -name "*.*" | xargs strip 2>/dev/null || true

          # MANUELL ZIPPEN
          zip -r PCF_ReBirth_Linux.zip PCF_ReBirth.vst3

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_Linux
          path: PCF_ReBirth_Linux.zip # Auch hier: Nur die Zip-Datei!

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PCF_ReBirth_Linux.zip
