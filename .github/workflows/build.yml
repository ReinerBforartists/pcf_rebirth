name: Build VST3 – macOS & Linux

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout Projekt
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: CMake konfigurieren
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13"

      - name: Bauen
        run: cmake --build build --config Release

      - name: VST3 Bundle isolieren
        run: |
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          cp -r "$VST3_PATH" PCF_ReBirth.vst3
          find PCF_ReBirth.vst3 -type f \( -name "*.dylib" -o ! -name "*.*" \) | xargs strip -x 2>/dev/null || true

      - name: Artefakt hochladen (für Test-Download)
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_macOS
          path: PCF_ReBirth.vst3 # HIER DEN ORDNER! GitHub zippt ihn einmal.

      - name: Release Asset vorbereiten (für echte Verteilung)
        if: github.event_name == 'release'
        run: zip -r PCF_ReBirth_macOS.zip PCF_ReBirth.vst3

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PCF_ReBirth_macOS.zip # HIER DIE ZIP! Keine doppelte Zip beim Release.

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Projekt
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libwebkit2gtk-4.0-dev libglu1-mesa-dev libcurl4-openssl-dev libjack-jackd2-dev ladspa-sdk mesa-common-dev zip

      - name: CMake konfigurieren
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Bauen
        run: cmake --build build --config Release

      - name: VST3 Bundle isolieren
        run: |
          VST3_PATH=$(find build -name "*.vst3" -type d | head -1)
          cp -r "$VST3_PATH" PCF_ReBirth.vst3
          find PCF_ReBirth.vst3 -type f ! -name "*.*" | xargs strip 2>/dev/null || true

      - name: Artefakt hochladen (für Test-Download)
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_Linux
          path: PCF_ReBirth.vst3 # HIER DEN ORDNER!

      - name: Release Asset vorbereiten
        if: github.event_name == 'release'
        run: zip -r PCF_ReBirth_Linux.zip PCF_ReBirth.vst3

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PCF_ReBirth_Linux.zip
