name: Build VST3 – macOS & Linux

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # macOS – Universal Binary (Intel + Apple Silicon)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: CMake konfigurieren (Universal Binary)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="10.13"

      - name: Bauen
        run: cmake --build build --config Release

      - name: Bundle prüfen
        run: find build -name "*.vst3" -type d

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_macOS
          path: build/PCF_ReBirth_artefacts/Release/VST3/PCF_ReBirth.vst3

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/PCF_ReBirth_artefacts/Release/VST3/PCF_ReBirth.vst3

  # ──────────────────────────────────────────────
  # Linux – x86_64
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JUCE auschecken
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.4
          path: JUCE

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxinerama-dev \
            libxext-dev \
            libfreetype6-dev \
            libwebkit2gtk-4.0-dev \
            libglu1-mesa-dev \
            libcurl4-openssl-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            mesa-common-dev

      - name: CMake konfigurieren
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Bauen
        run: cmake --build build --config Release

      - name: Bundle prüfen
        run: find build -name "*.vst3"

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: PCF_ReBirth_Linux
          path: build/PCF_ReBirth_artefacts/VST3/PCF_ReBirth.vst3

      - name: Release Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/PCF_ReBirth_artefacts/VST3/PCF_ReBirth.vst3
